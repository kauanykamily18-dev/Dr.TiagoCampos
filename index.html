<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tiago Campos | Links</title>

<!-- Fonte Poppins -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    font-family:'Poppins', sans-serif;
    color:#fff;
    overflow-x:hidden;
}

/* HERO */
.hero{
    width:100%;
    min-height:100vh;
    background:url('IMG_2183.JPG.jpeg') center top no-repeat;
    background-size:cover;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-end;
    text-align:center;
    padding:40px 20px;
    position:relative;
}

.hero::before{
    content:'';
    position:absolute;
    inset:0;
}

.hero-content{
    position:relative;
    z-index:2;
    max-width:700px;
}

.hero h1{
    font-size:25px;
    line-height:1.4;
    font-weight:600;
    margin-bottom:25px;
}

.hero p{
    font-size:22px;
    font-weight:400;
    opacity:.95;
}

/* seta */
.arrow{
    margin-top:35px;
    font-size:38px;
    animation:float 1.5s infinite;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(8px);}
}

/* BOTÕES IMAGEM */
.links{
    width:100%;
    max-width:700px;
    margin:60px auto 30px;
    padding:0 20px;
}

.link-btn{
    width:100%;
    margin-bottom:45px;
    display:flex;
    justify-content:center;
    position:relative;
}

.link-btn img{
    width:100%;
    max-width:560px;
    border-radius:28px;
    cursor:pointer;
    transition:.3s ease;
    border:2px solid #b68b2c;
}

.link-btn img:hover{
    transform:translateY(-5px) scale(1.01);
}

/* luz embaixo */
.link-btn::after{
    content:'';
    position:absolute;
    bottom:-18px;
    width:65%;
    height:20px;
    background:radial-gradient(circle, rgba(212,168,52,.55) 0%, rgba(212,168,52,.15) 40%, transparent 75%);
    filter:blur(8px);
}

/* footer */
footer{
    text-align:center;
    padding:40px 20px 30px;
    color:#fff;
    font-size:18px;
    opacity:.85;
}

/*sumir foto */
@media (min-width: 1024px){
   .hero{
      background-image:none !important;
      height:0 !important;
      padding:0 !important;
      overflow:none ;
   }
}

/* RESPONSIVO */
@media(max-width:768px){

.hero{
    min-height:900px;
    background-position:center top;
}

.hero h1{
    font-size:25px;
}

.hero p{
    font-size:18px;
}

footer{
    font-size:15px;
}

}

</style>
</head>
<body>

<!-- HERO -->
<section class="hero">

    <div class="hero-content">
        <h1>
            Olá, seja muito bem vindo(a)<br>
            à minha página de links!
        </h1>

        <p>Clique no botão para ser redirecionado</p>

        <div class="arrow">↓</div>
    </div>

</section>

<!-- BOTÕES -->
<section class="links">

    <!-- BOTÃO 1 -->
    <div class="link-btn">
        <img src="Group 6.png" alt="Agende sua consulta" onclick="abrirWhatsapp()">
    </div>

    <!-- BOTÃO 2 -->
    <div class="link-btn">
        <img src="Group 2.png" alt="Visite nosso escritório" onclick="abrirMapa()">
    </div>

    <!-- BOTÃO 3 -->
    <div class="link-btn">
        <img src="Group 3.png" alt="Instagram" onclick="abrirInstagram()">
    </div>

</section>

<footer>
@ 2026 Tiago Campos. Todos os direitos reservados.
</footer>

<script>
function abrirWhatsapp(){
    window.open("https://api.whatsapp.com/send?phone=5565998134814&text=Ol%C3%A1%2C%20Tudo%20bem%3F%0AGostaria%20de%20informa%C3%A7%C3%B5es%2C%20pode%20me%20retornar%20o%20Contato%3F%20Estarei%20aguardando!%0A%0A");
}

function abrirMapa(){
    window.open("https://maps.app.goo.gl/dZx9WUkq31WPLiop6");
}

function abrirInstagram(){
    window.open("https://www.instagram.com/tiagocampos.adv/?hl=pt-br");
}
</script>

</body>
</html>
